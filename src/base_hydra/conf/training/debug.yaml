# Debug / quick-test training config (small epochs, small batch)
intermediate:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  per_device_eval_batch_size: 4
  learning_rate: 1e-5
  num_train_epochs: 2
  early_stopping_patience: 1
  eval_strategy: epoch
  logging_strategy: epoch
  save_strategy: epoch
  save_total_limit: 1
  fp16: true
  lr_scheduler_type: constant
  metric_for_best_model: loss
  load_best_model_at_end: true
  remove_unused_columns: false
  report_to: tensorboard

fine_tuning:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  per_device_eval_batch_size: 4
  learning_rate: 1e-5
  num_train_epochs: 2
  early_stopping_patience: 1
  eval_strategy: epoch
  logging_strategy: epoch
  save_strategy: epoch
  save_total_limit: 1
  fp16: true
  lr_scheduler_type: constant
  metric_for_best_model: loss
  load_best_model_at_end: true
  remove_unused_columns: false
  report_to: tensorboard
